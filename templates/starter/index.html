<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Meow App</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    .app { max-width: 32rem; }
    .controls { display: flex; gap: 0.5rem; margin: 1rem 0; }
    input { padding: 0.5rem; width: 100%; }
    .meow-btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 0.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .meow-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
